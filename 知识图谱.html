<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人工智能训练师三级 - 知识图谱</title>
    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #0c0c1d 0%, #1a1a3e 50%, #0d0d2b 100%);
            color: #e0e0e0;
            min-height: 100vh;
            overflow: hidden;
        }

        .header {
            background: rgba(15, 15, 40, 0.95);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid rgba(100, 200, 255, 0.3);
            backdrop-filter: blur(10px);
            z-index: 100;
            position: relative;
        }

        .header h1 {
            font-size: 24px;
            background: linear-gradient(90deg, #00d4ff, #7b68ee, #ff6b9d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(0, 212, 255, 0.5);
        }

        .header .subtitle {
            font-size: 14px;
            color: #8888aa;
        }

        .controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .btn {
            padding: 8px 16px;
            border: 1px solid rgba(100, 200, 255, 0.3);
            background: rgba(100, 200, 255, 0.1);
            color: #00d4ff;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background: rgba(100, 200, 255, 0.2);
            border-color: #00d4ff;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.3);
        }

        .btn.active {
            background: rgba(0, 212, 255, 0.3);
            border-color: #00d4ff;
        }

        .search-box {
            padding: 8px 12px;
            border: 1px solid rgba(100, 200, 255, 0.3);
            background: rgba(20, 20, 50, 0.8);
            color: #e0e0e0;
            border-radius: 6px;
            width: 200px;
            font-size: 13px;
        }

        .search-box:focus {
            outline: none;
            border-color: #00d4ff;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
        }

        .container {
            display: flex;
            height: calc(100vh - 65px);
        }

        .sidebar {
            width: 320px;
            background: rgba(15, 15, 40, 0.95);
            border-right: 1px solid rgba(100, 200, 255, 0.2);
            overflow-y: auto;
            padding: 20px;
            backdrop-filter: blur(10px);
        }

        .sidebar::-webkit-scrollbar {
            width: 6px;
        }

        .sidebar::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
        }

        .sidebar::-webkit-scrollbar-thumb {
            background: rgba(100, 200, 255, 0.3);
            border-radius: 3px;
        }

        .category-card {
            background: rgba(30, 30, 70, 0.6);
            border: 1px solid rgba(100, 200, 255, 0.15);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .category-card:hover {
            background: rgba(40, 40, 90, 0.8);
            border-color: rgba(100, 200, 255, 0.4);
            transform: translateX(5px);
        }

        .category-card.selected {
            border-color: #00d4ff;
            background: rgba(0, 212, 255, 0.1);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
        }

        .category-card .icon {
            font-size: 28px;
            margin-bottom: 8px;
        }

        .category-card .title {
            font-size: 15px;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 5px;
        }

        .category-card .count {
            font-size: 12px;
            color: #8888aa;
        }

        .category-card .progress-bar {
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            margin-top: 10px;
            overflow: hidden;
        }

        .category-card .progress-fill {
            height: 100%;
            border-radius: 2px;
            transition: width 0.5s ease;
        }

        #graph-container {
            flex: 1;
            position: relative;
        }

        #knowledge-graph {
            width: 100%;
            height: 100%;
        }

        .detail-panel {
            position: absolute;
            right: 20px;
            top: 20px;
            width: 350px;
            max-height: calc(100% - 40px);
            background: rgba(15, 15, 40, 0.95);
            border: 1px solid rgba(100, 200, 255, 0.3);
            border-radius: 12px;
            padding: 20px;
            backdrop-filter: blur(15px);
            overflow-y: auto;
            display: none;
            animation: slideIn 0.3s ease;
            z-index: 50;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .detail-panel::-webkit-scrollbar {
            width: 6px;
        }

        .detail-panel::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
        }

        .detail-panel::-webkit-scrollbar-thumb {
            background: rgba(100, 200, 255, 0.3);
            border-radius: 3px;
        }

        .detail-panel .close-btn {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 20px;
            cursor: pointer;
            color: #8888aa;
            transition: color 0.3s;
        }

        .detail-panel .close-btn:hover {
            color: #ff6b9d;
        }

        .detail-panel .node-icon {
            font-size: 48px;
            text-align: center;
            margin-bottom: 15px;
        }

        .detail-panel .node-title {
            font-size: 20px;
            font-weight: 600;
            color: #00d4ff;
            text-align: center;
            margin-bottom: 5px;
        }

        .detail-panel .node-type {
            text-align: center;
            color: #8888aa;
            font-size: 13px;
            margin-bottom: 20px;
        }

        .detail-panel .section-title {
            font-size: 14px;
            font-weight: 600;
            color: #7b68ee;
            margin: 15px 0 10px 0;
            padding-bottom: 5px;
            border-bottom: 1px solid rgba(123, 104, 238, 0.3);
        }

        .detail-panel .knowledge-list {
            list-style: none;
        }

        .detail-panel .knowledge-list li {
            padding: 8px 12px;
            margin-bottom: 6px;
            background: rgba(30, 30, 70, 0.5);
            border-radius: 6px;
            font-size: 13px;
            color: #ccccdd;
            border-left: 3px solid rgba(100, 200, 255, 0.3);
        }

        .detail-panel .related-nodes {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .detail-panel .related-tag {
            padding: 5px 10px;
            background: rgba(123, 104, 238, 0.2);
            border: 1px solid rgba(123, 104, 238, 0.3);
            border-radius: 15px;
            font-size: 12px;
            color: #b8b8ff;
            cursor: pointer;
            transition: all 0.3s;
        }

        .detail-panel .related-tag:hover {
            background: rgba(123, 104, 238, 0.4);
            border-color: #7b68ee;
        }

        .stats-bar {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            background: rgba(15, 15, 40, 0.9);
            padding: 12px 25px;
            border-radius: 25px;
            border: 1px solid rgba(100, 200, 255, 0.2);
            backdrop-filter: blur(10px);
            z-index: 50;
        }

        .stat-item {
            text-align: center;
        }

        .stat-item .stat-value {
            font-size: 20px;
            font-weight: 700;
            color: #00d4ff;
        }

        .stat-item .stat-label {
            font-size: 11px;
            color: #8888aa;
        }

        .legend {
            position: absolute;
            bottom: 80px;
            left: 20px;
            background: rgba(15, 15, 40, 0.9);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid rgba(100, 200, 255, 0.2);
            backdrop-filter: blur(10px);
            z-index: 50;
        }

        .legend-title {
            font-size: 13px;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 10px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
            font-size: 12px;
            color: #ccccdd;
        }

        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .tooltip {
            position: absolute;
            background: rgba(15, 15, 40, 0.95);
            border: 1px solid rgba(100, 200, 255, 0.4);
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 13px;
            color: #e0e0e0;
            pointer-events: none;
            z-index: 1000;
            max-width: 250px;
            backdrop-filter: blur(10px);
            display: none;
        }

        .tooltip .tip-title {
            font-weight: 600;
            color: #00d4ff;
            margin-bottom: 5px;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: rgba(100, 200, 255, 0.6);
            border-radius: 50%;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <h1>🧠 人工智能训练师三级 - 知识图谱</h1>
            <div class="subtitle">Interactive Knowledge Graph · 900+ 题目知识点关联可视化</div>
        </div>
        <div class="controls">
            <input type="text" class="search-box" placeholder="🔍 搜索知识点..." id="searchInput">
            <button class="btn" id="btnReset" title="重置视图">🔄 重置</button>
            <button class="btn" id="btnPhysics" title="物理引擎">⚡ 物理</button>
            <button class="btn" id="btnHierarchy" title="层级布局">📊 层级</button>
            <button class="btn" id="btnExpand" title="展开全部">🔓 展开</button>
        </div>
    </div>

    <div class="container">
        <div class="sidebar" id="sidebar">
            <!-- Category cards will be inserted here -->
        </div>
        <div id="graph-container">
            <div id="knowledge-graph"></div>
            <div class="detail-panel" id="detailPanel">
                <span class="close-btn" id="closeDetail">&times;</span>
                <div id="detailContent"></div>
            </div>
            <div class="legend">
                <div class="legend-title">图例说明</div>
                <div class="legend-item">
                    <div class="legend-dot" style="background: #ff6b9d;"></div>
                    <span>核心概念</span>
                </div>
                <div class="legend-item">
                    <div class="legend-dot" style="background: #00d4ff;"></div>
                    <span>知识领域</span>
                </div>
                <div class="legend-item">
                    <div class="legend-dot" style="background: #7b68ee;"></div>
                    <span>知识模块</span>
                </div>
                <div class="legend-item">
                    <div class="legend-dot" style="background: #50fa7b;"></div>
                    <span>具体知识点</span>
                </div>
                <div class="legend-item">
                    <div class="legend-dot" style="background: #ffb86c;"></div>
                    <span>工具/技术</span>
                </div>
            </div>
            <div class="stats-bar">
                <div class="stat-item">
                    <div class="stat-value" id="statNodes">0</div>
                    <div class="stat-label">知识节点</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="statEdges">0</div>
                    <div class="stat-label">关联关系</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="statCategories">16</div>
                    <div class="stat-label">知识领域</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value">900</div>
                    <div class="stat-label">题目总数</div>
                </div>
            </div>
        </div>
    </div>

    <div class="tooltip" id="tooltip">
        <div class="tip-title" id="tipTitle"></div>
        <div id="tipContent"></div>
    </div>

    <script>

                        strokeColor: '#000000'
                    },
                    title: `<div style="padding:10px;"><strong>${node.label.replace(/\n/g, ' ')}</strong><br>${node.description}<br>题目数量: ${node.questionCount || '-'}</div>`,
                    shape: node.group === 'core' ? 'star' : (node.group === 'tool' ? 'diamond' : 'dot'),
                    borderWidth: node.group === 'core' ? 4 : 2,
                    shadow: {
                        enabled: true,
                        color: groupConfig.color.replace(')', ', 0.5)').replace('rgb', 'rgba'),
                        size: 15,
                        x: 0,
                        y: 0
                    }
                };
            }));

            // Process edges
            const edges = new vis.DataSet(knowledgeData.edges.map(edge => ({
                ...edge,
                color: {
                    color: edge.dashes ? 'rgba(255, 255, 255, 0.2)' : 'rgba(100, 200, 255, 0.4)',
                    highlight: '#00d4ff',
                    hover: '#7b68ee'
                },
                width: edge.dashes ? 1 : 2,
                smooth: {
                    type: 'continuous',
                    roundness: 0.5
                },
                font: {
                    size: 10,
                    color: '#8888aa',
                    strokeWidth: 0
                }
            })));

            allNodes = nodes;
            allEdges = edges;

            const options = {
                physics: {
                    enabled: true,
                    solver: 'forceAtlas2Based',
                    forceAtlas2Based: {
                        gravitationalConstant: -100,
                        centralGravity: 0.01,
                        springLength: 200,
                        springConstant: 0.08,
                        damping: 0.4,
                        avoidOverlap: 0.8
                    },
                    stabilization: {
                        enabled: true,
                        iterations: 200,
                        updateInterval: 25
                    }
                },
                interaction: {
                    hover: true,
                    tooltipDelay: 200,
                    zoomView: true,
                    dragView: true,
                    navigationButtons: false,
                    keyboard: {
                        enabled: true
                    }
                },
                nodes: {
                    font: {
                        size: 14,
                        face: 'Microsoft YaHei'
                    }
                },
                layout: {
                    improvedLayout: true,
                    hierarchical: false
                }
            };

            network = new vis.Network(container, { nodes, edges }, options);

            // Event listeners
            network.on('click', function(params) {
                if (params.nodes.length > 0) {
                    const nodeId = params.nodes[0];
                    const node = nodes.get(nodeId);
                    showDetail(node);
                    highlightConnected(nodeId);
                } else {
                    hideDetail();
                    resetHighlight();
                }
            });

            network.on('hoverNode', function(params) {
                const nodeId = params.node;
                const node = nodes.get(nodeId);
                showTooltip(params.event, node);
            });

            network.on('blurNode', function() {
                hideTooltip();
            });

            network.on('stabilizationIterationsDone', function() {
                updateStats();
            });

            // Populate sidebar
            populateSidebar();

            // Update stats
            setTimeout(updateStats, 1000);
        }

        function getGroupConfig(group) {
            const configs = {
                core: { color: '#ff6b9d', font: { size: 18 } },
                domain: { color: '#00d4ff' },
                module: { color: '#7b68ee' },
                knowledge: { color: '#50fa7b' },
                tool: { color: '#ffb86c' }
            };
            return configs[group] || configs.knowledge;
        }

        function getNodeSize(node) {
            if (node.group === 'core') return 50;
            if (node.group === 'domain') return 35;
            if (node.group === 'module') return 25;
            return 18;
        }

        function getNodeFontSize(node) {
            if (node.group === 'core') return 16;
            if (node.group === 'domain') return 13;
            if (node.group === 'module') return 11;
            return 10;
        }

        function showDetail(node) {
            const panel = document.getElementById('detailPanel');
            const content = document.getElementById('detailContent');

            let html = `
                <div class="node-icon">${node.icon}</div>
                <div class="node-title">${node.label.replace(/\n/g, ' ')}</div>
                <div class="node-type">${getGroupLabel(node.group)}</div>
            `;

            if (node.description) {
                html += `
                    <div class="section-title">📝 描述</div>
                    <p style="font-size: 13px; color: #ccccdd; line-height: 1.6;">${node.description}</p>
                `;
            }

            if (node.questionCount) {
                html += `
                    <div class="section-title">📊 题目统计</div>
                    <p style="font-size: 14px; color: #00d4ff; font-weight: 600;">${node.questionCount} 道相关题目</p>
                `;
            }

            // Get connected nodes
            const connectedNodes = getConnectedNodes(node.id);
            if (connectedNodes.length > 0) {
                html += `
                    <div class="section-title">🔗 关联知识点</div>
                    <div class="related-nodes">
                        ${connectedNodes.map(n => `<span class="related-tag" onclick="focusNode('${n.id}')">${n.icon} ${n.label.replace(/\n/g, ' ')}</span>`).join('')}
                    </div>
                `;
            }

            // Get knowledge points for domain nodes
            if (node.category) {
                const knowledgePoints = getKnowledgePoints(node.category);
                if (knowledgePoints.length > 0) {
                    html += `
                        <div class="section-title">📚 核心知识点</div>
                        <ul class="knowledge-list">
                            ${knowledgePoints.map(kp => `<li>${kp}</li>`).join('')}
                        </ul>
                    `;
                }
            }

            content.innerHTML = html;
            panel.style.display = 'block';
        }

        function hideDetail() {
            document.getElementById('detailPanel').style.display = 'none';
        }

        function getGroupLabel(group) {
            const labels = {
                core: '核心概念',
                domain: '知识领域',
                module: '知识模块',
                knowledge: '具体知识点',
                tool: '工具/技术'
            };
            return labels[group] || '知识点';
        }

        function getConnectedNodes(nodeId) {
            const connected = [];
            const edges = knowledgeData.edges.filter(e => e.from === nodeId || e.to === nodeId);
            edges.forEach(edge => {
                const connectedId = edge.from === nodeId ? edge.to : edge.from;
                const node = knowledgeData.nodes.find(n => n.id === connectedId);
                if (node) connected.push(node);
            });
            return connected;
        }

        function highlightConnected(nodeId) {
            const connectedNodes = new Set();
            const connectedEdges = new Set();

            connectedNodes.add(nodeId);

            knowledgeData.edges.forEach((edge, index) => {
                if (edge.from === nodeId || edge.to === nodeId) {
                    connectedNodes.add(edge.from);
                    connectedNodes.add(edge.to);
                    connectedEdges.add(index);
                }
            });

            // Update node styles
            allNodes.forEach(node => {
                if (connectedNodes.has(node.id)) {
                    allNodes.update({
                        id: node.id,
                        opacity: 1,
                        borderWidth: node.id === nodeId ? 4 : 2
                    });
                } else {
                    allNodes.update({
                        id: node.id,
                        opacity: 0.15
                    });
                }
            });

            // Update edge styles
            allEdges.forEach((edge, index) => {
                if (connectedEdges.has(index)) {
                    allEdges.update({
                        id: edge.id,
                        opacity: 1,
                        width: 3
                    });
                } else {
                    allEdges.update({
                        id: edge.id,
                        opacity: 0.1
                    });
                }
            });
        }

        function resetHighlight() {
            allNodes.forEach(node => {
                allNodes.update({
                    id: node.id,
                    opacity: 1,
                    borderWidth: node.group === 'core' ? 4 : 2
                });
            });

            allEdges.forEach(edge => {
                allEdges.update({
                    id: edge.id,
                    opacity: 1,
                    width: edge.dashes ? 1 : 2
                });
            });
        }

        function focusNode(nodeId) {
            network.focus(nodeId, { scale: 1.2, animation: true });
            network.selectNodes([nodeId]);
            const node = allNodes.get(nodeId);
            showDetail(node);
            highlightConnected(nodeId);
        }

        function showTooltip(event, node) {
            const tooltip = document.getElementById('tooltip');
            const tipTitle = document.getElementById('tipTitle');
            const tipContent = document.getElementById('tipContent');

            tipTitle.textContent = node.icon + ' ' + node.label.replace(/\n/g, ' ');
            tipContent.textContent = node.description || '';

            tooltip.style.display = 'block';
            tooltip.style.left = (event.pointer.DOM.x + 15) + 'px';
            tooltip.style.top = (event.pointer.DOM.y + 15) + 'px';
        }

        function hideTooltip() {
            document.getElementById('tooltip').style.display = 'none';
        }

        function populateSidebar() {
            const sidebar = document.getElementById('sidebar');
            const categories = knowledgeData.nodes.filter(n => n.group === 'domain');

            const colors = ['#ff6b9d', '#00d4ff', '#7b68ee', '#50fa7b', '#ffb86c', '#ff79c6', '#8be9fd', '#bd93f9', '#f1fa8c', '#ffb86c', '#ff5555', '#50fa7b', '#bd93f9', '#8be9fd', '#ff79c6'];

            categories.forEach((cat, index) => {
                const card = document.createElement('div');
                card.className = 'category-card';
                card.innerHTML = `
                    <div class="icon">${cat.icon}</div>
                    <div class="title">${cat.label.replace(/\n/g, ' ')}</div>
                    <div class="count">${cat.questionCount} 道题目</div>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${(cat.questionCount / 227 * 100)}%; background: ${colors[index % colors.length]};"></div>
                    </div>
                `;
                card.onclick = () => {
                    focusNode(cat.id);
                    document.querySelectorAll('.category-card').forEach(c => c.classList.remove('selected'));
                    card.classList.add('selected');
                };
                sidebar.appendChild(card);
            });
        }

        function updateStats() {
            document.getElementById('statNodes').textContent = knowledgeData.nodes.length;
            document.getElementById('statEdges').textContent = knowledgeData.edges.length;
        }

        // Control handlers
        document.getElementById('btnReset').onclick = () => {
            network.fit({ animation: true });
            resetHighlight();
            hideDetail();
        };

        document.getElementById('btnPhysics').onclick = function() {
            physicsEnabled = !physicsEnabled;
            network.setOptions({ physics: { enabled: physicsEnabled } });
            this.classList.toggle('active');
        };

        document.getElementById('btnHierarchy').onclick = function() {
            const isHierarchical = network.options.layout.hierarchical;
            network.setOptions({
                layout: {
                    hierarchical: !isHierarchical
                }
            });
            this.classList.toggle('active');
        };

        document.getElementById('btnExpand').onclick = function() {
            network.fit({ animation: true, scale: 0.8 });
        };

        document.getElementById('closeDetail').onclick = hideDetail;

        // Search functionality
        document.getElementById('searchInput').oninput = function(e) {
            const query = e.target.value.toLowerCase();
            if (!query) {
                resetHighlight();
                return;
            }

            const matchedNodes = new Set();
            knowledgeData.nodes.forEach(node => {
                const searchText = (node.label + ' ' + node.description + ' ' + (node.keywords || []).join(' ')).toLowerCase();
                if (searchText.includes(query)) {
                    matchedNodes.add(node.id);
                }
            });

            allNodes.forEach(node => {
                if (matchedNodes.has(node.id)) {
                    allNodes.update({ id: node.id, opacity: 1, borderWidth: 4 });
                } else {
                    allNodes.update({ id: node.id, opacity: 0.1 });
                }
            });
        };

        // Initialize
        window.onload = initNetwork;
    </script>
