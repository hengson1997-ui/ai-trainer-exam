<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #fafafa;
            color: #1a1a1a;
            height: 100vh;
            overflow: hidden;
        }

        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Header */
        .header {
            background: #fff;
            border-bottom: 1px solid #e5e5e5;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .logo {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #7c3aed, #2563eb);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 18px;
        }

        .header-title {
            font-size: 15px;
            font-weight: 600;
            color: #111;
        }

        .header-subtitle {
            font-size: 13px;
            color: #737373;
            margin-top: 1px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .search-input {
            width: 240px;
            padding: 8px 12px 8px 36px;
            border: 1px solid #e5e5e5;
            border-radius: 8px;
            font-size: 13px;
            color: #111;
            background: #f5f5f5;
            transition: all 0.2s;
            outline: none;
        }

        .search-input:focus {
            background: #fff;
            border-color: #7c3aed;
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
        }

        .search-wrapper {
            position: relative;
        }

        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #a3a3a3;
            font-size: 14px;
        }

        .btn {
            padding: 8px 14px;
            border: 1px solid #e5e5e5;
            background: #fff;
            color: #525252;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn:hover {
            background: #f5f5f5;
            border-color: #d4d4d4;
        }

        .btn.active {
            background: #7c3aed;
            border-color: #7c3aed;
            color: #fff;
        }

        /* Main content */
        .main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: #fff;
            border-right: 1px solid #e5e5e5;
            overflow-y: auto;
            padding: 20px 16px;
        }

        .sidebar::-webkit-scrollbar {
            width: 4px;
        }

        .sidebar::-webkit-scrollbar-thumb {
            background: #d4d4d4;
            border-radius: 2px;
        }

        .sidebar-title {
            font-size: 11px;
            font-weight: 600;
            color: #a3a3a3;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 0 4px;
            margin-bottom: 12px;
        }

        .category-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.15s;
            margin-bottom: 2px;
        }

        .category-item:hover {
            background: #f5f5f5;
        }

        .category-item.selected {
            background: #f5f3ff;
        }

        .category-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .category-name {
            flex: 1;
            font-size: 13px;
            font-weight: 500;
            color: #404040;
        }

        .category-count {
            font-size: 12px;
            color: #a3a3a3;
            font-variant-numeric: tabular-nums;
        }

        /* Graph container */
        .graph-container {
            flex: 1;
            position: relative;
            background: #fafafa;
        }

        #knowledge-graph {
            width: 100%;
            height: 100%;
        }

        /* Detail panel */
        .detail-panel {
            position: absolute;
            right: 20px;
            top: 20px;
            width: 320px;
            max-height: calc(100% - 40px);
            background: #fff;
            border: 1px solid #e5e5e5;
            border-radius: 12px;
            overflow: hidden;
            display: none;
            animation: slideIn 0.2s ease;
            z-index: 50;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .detail-header {
            padding: 20px;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .detail-icon {
            width: 48px;
            height: 48px;
            background: #f5f3ff;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .close-btn {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            background: transparent;
            color: #a3a3a3;
            cursor: pointer;
            border-radius: 6px;
            font-size: 18px;
            transition: all 0.15s;
        }

        .close-btn:hover {
            background: #f5f5f5;
            color: #525252;
        }

        .detail-title {
            font-size: 16px;
            font-weight: 600;
            color: #111;
            margin-top: 12px;
        }

        .detail-type {
            font-size: 12px;
            color: #a3a3a3;
            margin-top: 4px;
        }

        .detail-body {
            padding: 20px;
            overflow-y: auto;
            max-height: calc(100vh - 250px);
        }

        .detail-body::-webkit-scrollbar {
            width: 4px;
        }

        .detail-body::-webkit-scrollbar-thumb {
            background: #d4d4d4;
            border-radius: 2px;
        }

        .detail-desc {
            font-size: 13px;
            color: #525252;
            line-height: 1.6;
            padding: 12px;
            background: #f9fafb;
            border-radius: 8px;
            margin-bottom: 16px;
        }

        .detail-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 16px;
        }

        .stat-card {
            padding: 12px;
            background: #f9fafb;
            border-radius: 8px;
            text-align: center;
        }

        .stat-value {
            font-size: 20px;
            font-weight: 600;
            color: #7c3aed;
            font-variant-numeric: tabular-nums;
        }

        .stat-label {
            font-size: 11px;
            color: #a3a3a3;
            margin-top: 2px;
        }

        .section-label {
            font-size: 11px;
            font-weight: 600;
            color: #a3a3a3;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
        }

        .related-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .related-tag {
            padding: 5px 10px;
            background: #f5f5f5;
            border: 1px solid #e5e5e5;
            border-radius: 6px;
            font-size: 12px;
            color: #525252;
            cursor: pointer;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .related-tag:hover {
            background: #f5f3ff;
            border-color: #7c3aed;
            color: #7c3aed;
        }

        /* Bottom stats */
        .bottom-bar {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 32px;
            background: #fff;
            padding: 12px 24px;
            border-radius: 10px;
            border: 1px solid #e5e5e5;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        }

        .bottom-stat {
            text-align: center;
        }

        .bottom-stat-value {
            font-size: 18px;
            font-weight: 600;
            color: #111;
            font-variant-numeric: tabular-nums;
        }

        .bottom-stat-label {
            font-size: 11px;
            color: #a3a3a3;
            margin-top: 1px;
        }

        /* Legend */
        .legend {
            position: absolute;
            bottom: 80px;
            left: 20px;
            background: #fff;
            padding: 16px;
            border-radius: 10px;
            border: 1px solid #e5e5e5;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        }

        .legend-title {
            font-size: 11px;
            font-weight: 600;
            color: #a3a3a3;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            font-size: 12px;
            color: #525252;
        }

        .legend-item:last-child {
            margin-bottom: 0;
        }

        .legend-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .legend-square {
            width: 8px;
            height: 8px;
            border-radius: 2px;
        }

        /* Empty state */
        .empty-state {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #a3a3a3;
            display: none;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .empty-state-text {
            font-size: 14px;
        }
    </style>
</head>

        const categoryColors = ['#7c3aed', '#2563eb', '#0891b2', '#059669', '#d97706'];

        // Initialize chart
        const chart = echarts.init(document.getElementById('knowledge-graph'));

        let currentLayout = 'force';

        function getOption(layout) {
            return {
                backgroundColor: 'transparent',
                tooltip: {
                    show: true,
                    backgroundColor: '#fff',
                    borderColor: '#e5e5e5',
                    borderWidth: 1,
                    textStyle: {
                        color: '#111',
                        fontSize: 13
                    },
                    extraCssText: 'box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); border-radius: 8px;',
                    formatter: function(params) {
                        if (params.dataType === 'node') {
                            return `<div style="padding: 4px 0;">
                                <div style="font-weight: 600;">${params.data.name}</div>
                                <div style="color: #737373; font-size: 12px; margin-top: 4px;">${params.data.description}</div>
                                ${params.data.value ? `<div style="color: #7c3aed; margin-top: 6px; font-size: 12px;">${params.data.value} 道题目</div>` : ''}
                            </div>`;
                        }
                        return '';
                    }
                },
                animationDuration: 1000,
                animationEasingUpdate: 'cubicInOut',
                series: [{
                    type: 'graph',
                    layout: layout,
                    data: knowledgeData.nodes.map(node => ({
                        ...node,
                        itemStyle: {
                            color: categoryColors[node.category],
                            borderColor: '#fff',
                            borderWidth: node.category === 0 ? 3 : 1,
                            shadowBlur: 0
                        },
                        label: {
                            show: node.symbolSize > 18,
                            position: 'right',
                            formatter: '{b}',
                            fontSize: node.category === 0 ? 13 : (node.category === 1 ? 11 : 10),
                            color: '#404040',
                            fontWeight: node.category <= 1 ? 500 : 400
                        }
                    })),
                    links: knowledgeData.links.map(link => ({
                        ...link,
                        lineStyle: {
                            color: link.lineStyle?.type === 'dashed' ? '#d4d4d4' : '#e5e5e5',
                            width: link.lineStyle?.type === 'dashed' ? 1 : 1.5,
                            curveness: 0.2,
                            ...link.lineStyle
                        }
                    })),
                    categories: knowledgeData.categories,
                    roam: true,
                    draggable: true,
                    force: {
                        repulsion: 250,
                        gravity: 0.05,
                        edgeLength: 120,
                        layoutAnimation: true
                    },
                    circular: {
                        rotateLabel: true
                    },
                    emphasis: {
                        focus: 'adjacency',
                        lineStyle: {
                            width: 3,
                            color: '#7c3aed'
                        },
                        itemStyle: {
                            borderColor: '#7c3aed',
                            borderWidth: 2,
                            shadowBlur: 10,
                            shadowColor: 'rgba(124, 58, 237, 0.3)'
                        },
                        label: {
                            fontWeight: 600
                        }
                    },
                    blur: {
                        itemStyle: {
                            opacity: 0.15
                        },
                        lineStyle: {
                            opacity: 0.05
                        },
                        label: {
                            opacity: 0.3
                        }
                    }
                }]
            };
        }

        chart.setOption(getOption('force'));

        window.addEventListener('resize', () => chart.resize());

        // Node click
        chart.on('click', function(params) {
            if (params.dataType === 'node') {
                showDetail(params.data);
            }
        });

        // Detail panel
        function showDetail(node) {
            const panel = document.getElementById('detailPanel');
            const categoryNames = ['核心概念', '知识领域', '知识模块', '知识点', '工具'];
            const categoryIcons = ['🎯', '📚', '📖', '📝', '🔧'];

            document.getElementById('detailIcon').textContent = categoryIcons[node.category];
            document.getElementById('detailTitle').textContent = node.name;
            document.getElementById('detailType').textContent = categoryNames[node.category];
            document.getElementById('detailDesc').textContent = node.description;

            const connectedCount = knowledgeData.links.filter(l => l.source === node.id || l.target === node.id).length;

            if (node.value) {
                document.getElementById('detailStats').innerHTML = `
                    <div class="stat-card">
                        <div class="stat-value">${node.value}</div>
                        <div class="stat-label">相关题目</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${connectedCount}</div>
                        <div class="stat-label">关联知识点</div>
                    </div>
                `;
                document.getElementById('detailStats').style.display = 'grid';
            } else {
                document.getElementById('detailStats').style.display = 'none';
            }

            const connectedNodes = getConnectedNodes(node.id);
            if (connectedNodes.length > 0) {
                document.getElementById('detailRelated').innerHTML = `
                    <div class="section-label">关联知识点</div>
                    <div class="related-list">
                        ${connectedNodes.map(n => `<span class="related-tag" onclick="focusNode('${n.id}')">${categoryIcons[n.category]} ${n.name}</span>`).join('')}
                    </div>
                `;
            } else {
                document.getElementById('detailRelated').innerHTML = '';
            }

            panel.style.display = 'block';
        }

        function hideDetail() {
            document.getElementById('detailPanel').style.display = 'none';
        }

        function getConnectedNodes(nodeId) {
            const connected = [];
            knowledgeData.links.forEach(link => {
                if (link.source === nodeId) {
                    const node = knowledgeData.nodes.find(n => n.id === link.target);
                    if (node) connected.push(node);
                }
                if (link.target === nodeId) {
                    const node = knowledgeData.nodes.find(n => n.id === link.source);
                    if (node) connected.push(node);
                }
            });
            return connected;
        }

        function focusNode(nodeId) {
            chart.dispatchAction({
                type: 'highlight',
                seriesIndex: 0,
                dataIndex: knowledgeData.nodes.findIndex(n => n.id === nodeId)
            });
            const node = knowledgeData.nodes.find(n => n.id === nodeId);
            if (node) showDetail(node);
        }

        // Sidebar
        function populateSidebar() {
            const sidebar = document.getElementById('sidebar');
            const categories = knowledgeData.nodes.filter(n => n.category === 1);

            categories.forEach((cat, index) => {
                const item = document.createElement('div');
                item.className = 'category-item';
                item.innerHTML = `
                    <div class="category-dot" style="background: ${categoryColors[1]};"></div>
                    <div class="category-name">${cat.name}</div>
                    <div class="category-count">${cat.value}</div>
                `;
                item.onclick = () => {
                    focusNode(cat.id);
                    document.querySelectorAll('.category-item').forEach(c => c.classList.remove('selected'));
                    item.classList.add('selected');
                };
                sidebar.appendChild(item);
            });
        }

        populateSidebar();

        // Stats
        document.getElementById('statNodes').textContent = knowledgeData.nodes.length;
        document.getElementById('statLinks').textContent = knowledgeData.links.length;

        // Controls
        document.getElementById('btnReset').onclick = () => {
            chart.dispatchAction({ type: 'restore' });
            hideDetail();
        };

        document.getElementById('btnLayout').onclick = function() {
            currentLayout = currentLayout === 'force' ? 'circular' : 'force';
            chart.setOption(getOption(currentLayout));
            this.classList.toggle('active');
        };

        document.getElementById('closeDetail').onclick = hideDetail;

        // Search
        document.getElementById('searchInput').oninput = function(e) {
            const query = e.target.value.toLowerCase();
            if (!query) {
                chart.setOption({
                    series: [{
                        data: knowledgeData.nodes.map(node => ({
                            ...node,
                            itemStyle: {
                                color: categoryColors[node.category],
                                borderColor: '#fff',
                                borderWidth: node.category === 0 ? 3 : 1
                            }
                        }))
                    }]
                });
                return;
            }

            const matched = new Set();
            knowledgeData.nodes.forEach(node => {
                if ((node.name + ' ' + node.description).toLowerCase().includes(query)) {
                    matched.add(node.id);
                }
            });

            chart.setOption({
                series: [{
                    data: knowledgeData.nodes.map(node => ({
                        ...node,
                        itemStyle: {
                            color: categoryColors[node.category],
                            borderColor: '#fff',
                            borderWidth: node.category === 0 ? 3 : 1,
                            opacity: matched.has(node.id) ? 1 : 0.1
                        }
                    }))
                }]
            });
        };
